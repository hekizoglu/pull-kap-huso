name: Yatırım Fonu Portföy Takip (Gemini & DeepSeek)

on:
  workflow_dispatch:
    inputs:
      yil:
        description: 'Yıl (YYYY)'
        required: true
        default: '2024'
      ay:
        description: 'Ay (1-12)'
        required: true
        default: '3'
      model:
        description: 'Kullanılacak Yapay Zeka Modeli'
        required: true
        default: 'gemini'
        type: choice
        options:
        - gemini
        - deepseek

jobs:
  analyze-funds:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4
      
    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install .
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Fon Analizini Başlat
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: |
        python fon_analizi.py "${{ inputs.yil }}" "${{ inputs.ay }}" "${{ inputs.model }}"
        
    - name: Analiz Sonuçlarını Yükle
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Fon-Analizi-${{ inputs.model }}-${{ inputs.yil }}-${{ inputs.ay }}
        path: |
          *.json
          *.csv
        retention-days: 7
