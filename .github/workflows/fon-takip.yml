name: Yatırım Fonu Portföy Takip (Gemini AI)

on:
  workflow_dispatch:
    inputs:
      yil:
        description: 'Veri çekilecek Yıl (örn: 2024)'
        required: true
        default: '2024'
      ay:
        description: 'Veri çekilecek Ay (1-12)'
        required: true
        default: '3'

jobs:
  analyze-funds:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4
      
    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        pip install .
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Fon Analizini Başlat
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python fon_analizi.py "${{ inputs.yil }}" "${{ inputs.ay }}"
        
    - name: Analiz Sonuçlarını Yükle
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Fon-Portfoy-Analizi-${{ inputs.yil }}-${{ inputs.ay }}
        path: |
          *.json
          *.csv
        retention-days: 7
