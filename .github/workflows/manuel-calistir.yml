name: Manuel KAP Verisi Çek

on:
  workflow_dispatch:
    inputs:
      hisse_kodu:
        description: 'Verisi çekilecek hisse senedi kodu (örn: THYAO, AKBNK, BIMAS)'
        required: true
        default: 'THYAO'
        type: string

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4
      
    - name: Python Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Bağımlılıkları Yükle
      run: |
        python -m pip install --upgrade pip
        # Mevcut projeyi paket olarak yükle (pykap kütüphanesi)
        pip install .
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        
    - name: Kodu Çalıştır ve Sonuçları İncele
      run: |
        python ornek_uygulama.py "${{ inputs.hisse_kodu }}"
